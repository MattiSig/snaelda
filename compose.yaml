services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snaelda
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d snaelda"]
      interval: 5s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs}
    command: "mini -dir=/data"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-snaelda}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-snaelda-secret}
      S3_BUCKET: ${S3_BUCKET:-snaelda-local}
    ports:
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
      - "${SEAWEEDFS_MASTER_PORT:-9333}:9333"
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
    volumes:
      - seaweedfs-data:/data

volumes:
  postgres-data:
  seaweedfs-data:
