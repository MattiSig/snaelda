services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: snaelda
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d snaelda"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
